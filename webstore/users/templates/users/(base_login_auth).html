<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auth{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.86)),
                url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1800&q=80") center/cover fixed no-repeat;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: rgba(23, 23, 23, 0.72);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 36px 32px;
            border-radius: 18px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.45);
        }

        h2 {
            text-align: center;
            margin: 0 0 8px 0;
            color: #ffd36a;
            letter-spacing: 0.01em;
        }

        .auth-subtitle {
            text-align: center;
            color: #d9d9d9;
            margin-bottom: 22px;
            font-size: 14px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form p {
            margin: 0 0 14px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: #e5e5e5;
        }

        input,
        select,
        textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            outline: none;
            background: rgba(0, 0, 0, 0.35);
            color: white;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(255, 211, 106, 0.9);
            box-shadow: 0 0 0 2px rgba(255, 211, 106, 0.18);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            margin-top: 6px;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(37, 99, 235, 0.25);
        }

        .secondary-btn {
            display: block;
            text-align: center;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .auth-link {
            text-align: center;
            margin-top: 16px;
            color: #d7d7d7;
            font-size: 14px;
        }

        .auth-link a {
            color: #ffd36a;
            text-decoration: none;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: #ff9d9d;
            margin: 0 0 8px 0;
            list-style: none;
            padding: 0;
            font-size: 13px;
        }

        .helptext {
            font-size: 12px;
            color: #bdbdbd;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>{% block header %}{% endblock %}</h2>
    <p class="auth-subtitle">{% block subtitle %}Быстрый вход в ваш аккаунт{% endblock %}</p>

    {% block content %}
    {% endblock %}

    {% block auth_links %}{% endblock %}

    <a href="{% url 'main:home' %}" class="secondary-btn">
        На главную
    </a>

</div>

</body>
</html>
